<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vylus Maison Core | v2.1 Google-Grade Release</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --moris-gold: #b08d57;
            --moris-cream: #f9f7f2;
            --moris-midnight: #0a0a0b;
            --bg-dark: #111112;
            --ui-accent: #333;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Inter', sans-serif; background: var(--bg-dark); color: white;
            overflow: hidden;
        }

        /* RELEASE HEADER */
        header {
            height: 60px; background: #000; display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 25px; border-bottom: 1px solid var(--ui-accent);
        }

        .status-pill {
            background: rgba(176, 141, 87, 0.2); color: var(--moris-gold);
            padding: 5px 12px; border-radius: 50px; font-size: 11px; font-weight: 700;
        }

        /* THE WORKSPACE */
        .workspace {
            display: grid; grid-template-columns: 450px 1fr;
            height: calc(100vh - 60px);
        }

        /* EDITOR SIDE */
        .editor-side {
            background: #161617; border-right: 1px solid var(--ui-accent);
            display: flex; flex-direction: column; padding: 20px;
        }

        .label { font-size: 10px; text-transform: uppercase; color: #666; letter-spacing: 2px; margin-bottom: 10px; }

        textarea {
            flex-grow: 1; background: #000; color: #88c0d0;
            border: 1px solid #222; padding: 15px; font-family: 'Monaco', monospace;
            font-size: 13px; outline: none; border-radius: 4px; resize: none;
        }

        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }

        .btn {
            padding: 14px; border: none; border-radius: 4px; font-weight: 700;
            cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.3s;
        }

        .btn-primary { background: var(--moris-gold); color: #000; }
        .btn-secondary { background: #fff; color: #000; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }

        /* PREVIEW SIDE (The Actual Visualizer) */
        .preview-side {
            background: var(--moris-cream); color: #1a1a1a;
            overflow-y: auto; padding: 80px; transition: background 0.5s ease;
        }

        /* MORIS 1901 THEME ENGINE - Applied to Output */
        #render-target.moris-1901 { color: #1a1a1a; }
        #render-target.moris-1901 h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-bottom: 0.2em; }
        #render-target.moris-1901 p { line-height: 1.8; font-size: 1.1rem; max-width: 700px; color: #333; }
        #render-target.moris-1901 button {
            background: #1a1a1a; color: #fff; border: none; padding: 18px 45px;
            text-transform: uppercase; letter-spacing: 3px; font-weight: 600;
            margin-top: 20px; cursor: pointer; transition: 0.4s;
        }
        #render-target.moris-1901 button:hover { background: var(--moris-gold); color: #000; }
        #render-target.moris-1901 input {
            border: none; border-bottom: 2px solid #1a1a1a; background: transparent;
            padding: 10px 0; width: 100%; margin-bottom: 25px; font-size: 1rem; outline: none;
        }

        /* NIGHT VARIANT SWITCH */
        .preview-side.night { background: var(--moris-midnight); color: var(--moris-cream); }
        .preview-side.night #render-target { color: var(--moris-cream); }
        .preview-side.night #render-target h1 { color: var(--moris-gold); }
        .preview-side.night #render-target button { background: var(--moris-gold); color: #000; }
        .preview-side.night #render-target input { border-bottom-color: var(--moris-gold); color: #fff; }

    </style>
</head>
<body>

<header>
    <div><span style="opacity: 0.5;">VYLUS</span> <strong>MAISON CORE</strong></div>
    <div style="display: flex; align-items: center; gap: 20px;">
        <div class="status-pill">ENGINE: MORIS_1901_STABLE</div>
        <button class="btn" style="padding: 8px 15px; font-size: 10px; background: #222; color: #fff;" onclick="toggleNight()">TOGGLE NIGHT MODE</button>
    </div>
</header>

<div class="workspace">
    <div class="editor-side">
        <div class="label">Input Raw HTML (Purge Mode Active)</div>
        <textarea id="input-code" oninput="liveRender()" placeholder="<h1>Luxury Awaits</h1><p>Paste your structure...</p><button>Explore</button>"></textarea>
        
        <div class="controls">
            <button class="btn btn-primary" onclick="copyFinal()">Copy Moris 1901 Code</button>
            <button class="btn btn-secondary" onclick="clearEditor()">Clear Editor</button>
        </div>
    </div>

    <div class="preview-side" id="visualizer-bg">
        <div class="label" style="margin-bottom: 40px;">Visualizer Output</div>
        <div id="render-target" class="moris-1901">
            <h1 style="font-style: italic; opacity: 0.2; font-size: 5rem;">Moris 1901</h1>
        </div>
    </div>
</div>

<script>
    function liveRender() {
        const raw = document.getElementById('input-code').value;
        const target = document.getElementById('render-target');
        
        // PURGE LOGIC: Strip classes, styles, and IDs in a temporary container
        const cleaner = document.createElement('div');
        cleaner.innerHTML = raw;
        const all = cleaner.querySelectorAll('*');
        all.forEach(el => {
            el.removeAttribute('style');
            el.removeAttribute('class');
            el.removeAttribute('id');
        });

        target.innerHTML = cleaner.innerHTML;
    }

    function toggleNight() {
        document.getElementById('visualizer-bg').classList.toggle('night');
    }

    function copyFinal() {
        const cleanHtml = document.getElementById('render-target').innerHTML;
        const isNight = document.getElementById('visualizer-bg').classList.contains('night');
        
        const css = `
<style>
    .vylus-m1901 { font-family: serif; padding: 60px; background: ${isNight ? '#0a0a0b' : '#f9f7f2'}; color: ${isNight ? '#f9f7f2' : '#1a1a1a'}; text-align: left; }
    .vylus-m1901 h1 { font-size: 3rem; color: ${isNight ? '#b08d57' : 'inherit'}; }
    .vylus-m1901 button { background: ${isNight ? '#b08d57' : '#1a1a1a'}; color: ${isNight ? '#000' : '#fff'}; padding: 15px 30px; border: none; text-transform: uppercase; cursor: pointer; }
</style>`;
        
        const output = `${css}\n<div class="vylus-m1901">\n${cleanHtml}\n</div>`;
        navigator.clipboard.writeText(output);
        alert("Luxury Bundle Copied! Ready for CHF 1,150 delivery.");
    }

    function clearEditor() {
        document.getElementById('input-code').value = '';
        liveRender();
    }
</script>

</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vylus Maison Core | v2.2 Google-Grade Release</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --moris-gold: #b08d57;
            --moris-cream: #f9f7f2;
            --moris-midnight: #0a0a0b;
            --comic-yellow: #FFDE03;
            --comic-red: #FE0000;
            --bg-dark: #111112;
            --ui-accent: #333;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Inter', sans-serif; background: var(--bg-dark); color: white;
            overflow: hidden;
        }

        header {
            height: 60px; background: #000; display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 25px; border-bottom: 1px solid var(--ui-accent);
        }

        .workspace {
            display: grid; grid-template-columns: 450px 1fr;
            height: calc(100vh - 60px);
        }

        .editor-side {
            background: #161617; border-right: 1px solid var(--ui-accent);
            display: flex; flex-direction: column; padding: 20px;
        }

        .label { font-size: 10px; text-transform: uppercase; color: #666; letter-spacing: 2px; margin-bottom: 10px; }

        textarea {
            flex-grow: 1; background: #000; color: #00ff00;
            border: 1px solid #222; padding: 15px; font-family: 'Monaco', monospace;
            font-size: 13px; outline: none; border-radius: 4px; resize: none;
        }

        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }

        .btn {
            padding: 12px; border: none; border-radius: 4px; font-weight: 700;
            cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.3s;
        }

        .preview-side {
            overflow-y: auto; padding: 80px; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* THEME 1: MORIS 1901 LUXURY */
        .preview-side.moris-mode { background: var(--moris-cream); color: #1a1a1a; }
        .moris-1901 h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-bottom: 10px; }
        .moris-1901 p { line-height: 1.8; color: #444; max-width: 650px; }
        .moris-1901 button { 
            background: #000; color: #fff; padding: 18px 45px; border: none; 
            text-transform: uppercase; letter-spacing: 3px; cursor: pointer;
        }
        .moris-1901 input { border: none; border-bottom: 2px solid #000; background: transparent; width: 100%; padding: 10px 0; margin: 15px 0; }

        /* THEME 2: DAVID'S COMIC POP */
        .preview-side.comic-mode { 
            background: var(--comic-yellow); 
            background-image: radial-gradient(#000 1.5px, transparent 1.5px); background-size: 20px 20px;
            color: #000;
        }
        .david-comic h1 { 
            font-family: 'Arial Black', sans-serif; font-size: 4rem; text-transform: uppercase;
            -webkit-text-stroke: 2px #000; color: #fff; text-shadow: 6px 6px 0px #000;
            transform: rotate(-2deg); margin-bottom: 40px;
        }
        .david-comic p { 
            background: #fff; border: 4px solid #000; padding: 20px; font-weight: 900; 
            display: inline-block; box-shadow: 10px 10px 0px #000; transform: rotate(1deg);
        }
        .david-comic button {
            background: var(--comic-red); color: #fff; border: 4px solid #000; padding: 20px 40px;
            font-family: 'Arial Black', sans-serif; font-size: 1.5rem; box-shadow: 6px 6px 0px #000;
            cursor: pointer; transition: 0.1s; text-transform: uppercase; margin-top: 30px;
        }
        .david-comic button:hover { transform: scale(1.1) rotate(-3deg); background: #00FF00; color: #000; }
        .david-comic input { border: 4px solid #000; padding: 15px; font-weight: bold; width: 80%; box-shadow: 5px 5px 0px #000; }
        
        @keyframes wobl { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .david-comic * { animation: wobl 3s infinite ease-in-out; }

    </style>
</head>
<body>

<header>
    <div><span style="opacity: 0.5;">VYLUS</span> <strong>MAISON CORE</strong></div>
    <div style="display: flex; gap: 10px;">
        <button class="btn" style="background: var(--moris-gold); color: #000;" onclick="switchTheme('moris')">MORIS 1901</button>
        <button class="btn" style="background: var(--comic-red); color: #fff;" onclick="switchTheme('comic')">DAVID'S COMIC</button>
    </div>
</header>

<div class="workspace">
    <div class="editor-side">
        <div class="label">Input Raw Code (Purge Engine Active)</div>
        <textarea id="main-input" oninput="runEngine()" placeholder="<h1>Release Ready</h1><p>Paste structure here...</p><button>Launch</button>"></textarea>
        <div class="controls">
            <button class="btn" style="background: #fff; color: #000;" onclick="copyExport()">Export Bundle</button>
            <button class="btn" style="background: #222; color: #666;" onclick="document.getElementById('main-input').value=''; runEngine();">Reset</button>
        </div>
    </div>

    <div class="preview-side moris-mode" id="viewport">
        <div class="label" id="theme-indicator" style="margin-bottom: 40px; color: inherit; opacity: 0.5;">Active Protocol: Moris 1901</div>
        <div id="output-canvas" class="moris-1901">
            <h1 style="font-style: italic; opacity: 0.1; font-size: 5rem;">MAISON</h1>
        </div>
    </div>
</div>

<script>
    let currentTheme = 'moris';

    function switchTheme(t) {
        currentTheme = t;
        const v = document.getElementById('viewport');
        const c = document.getElementById('output-canvas');
        const i = document.getElementById('theme-indicator');

        v.className = 'preview-side ' + t + '-mode';
        c.className = (t === 'moris') ? 'moris-1901' : 'david-comic';
        i.innerText = 'Active Protocol: ' + (t === 'moris' ? 'Moris 1901 Luxury' : "David's Comic Pop");
        runEngine();
    }

    function runEngine() {
        const input = document.getElementById('main-input').value;
        const canvas = document.getElementById('output-canvas');
        
        // HEAVY PURGE: Strip all classes/styles from input
        const sandbox = document.createElement('div');
        sandbox.innerHTML = input;
        const elements = sandbox.querySelectorAll('*');
        elements.forEach(el => {
            el.removeAttribute('style');
            el.removeAttribute('class');
            el.removeAttribute('id');
        });

        canvas.innerHTML = sandbox.innerHTML || '<h1 style="opacity:0.1">VYLUS</h1>';
    }

    function copyExport() {
        const content = document.getElementById('output-canvas').innerHTML;
        const isComic = currentTheme === 'comic';
        const styles = isComic ? `
<style>
    .export-comic { background: #FFDE03; padding: 50px; font-family: sans-serif; }
    .export-comic h1 { text-transform: uppercase; -webkit-text-stroke: 1px #000; color: #fff; text-shadow: 4px 4px 0px #000; font-size: 3rem; }
    .export-comic button { background: #FE0000; color: #fff; border: 3px solid #000; padding: 15px 30px; font-weight: bold; box-shadow: 4px 4px 0px #000; }
</style>` : `
<style>
    .export-moris { background: #f9f7f2; padding: 50px; color: #1a1a1a; font-family: serif; }
    .export-moris h1 { font-size: 3rem; border-bottom: 1px solid #ddd; }
    .export-moris button { background: #000; color: #fff; padding: 15px 40px; border: none; text-transform: uppercase; letter-spacing: 2px; }
</style>`;

        const wrapper = isComic ? 'export-comic' : 'export-moris';
        navigator.clipboard.writeText(styles + '\n<div class="' + wrapper + '">\n' + content + '\n</div>');
        alert("Success! " + currentTheme.toUpperCase() + " bundle exported for delivery.");
    }
</script>

</body>
</html>

    .david-comic * { animation: comic-bounce 2s infinite ease-in-out; }
</style>

<script>
    (function injectComicPlugin() {
        // 1. ADD THEME BUTTONS TO HEADER
        const headerRight = document.querySelector('header div:last-child');
        if (headerRight) {
            headerRight.innerHTML = `
                <button class="btn" style="background: #b08d57; color: #000;" onclick="switchTheme('moris')">LUXURY 1901</button>
                <button class="btn" style="background: #FE0000; color: #fff;" onclick="switchTheme('comic')">DAVID'S COMIC</button>
            `;
        }

        // 2. DEFINE THEME SWITCHER
        window.switchTheme = function(theme) {
            const viewport = document.getElementById('viewport');
            const canvas = document.getElementById('output-canvas');
            const indicator = document.getElementById('theme-indicator');

            if (theme === 'comic') {
                viewport.className = 'preview-side comic-mode';
                canvas.className = 'david-comic';
                indicator.innerText = "ACTIVE PROTOCOL: DAVID'S COMIC";
            } else {
                viewport.className = 'preview-side moris-mode';
                canvas.className = 'moris-1901';
                indicator.innerText = "ACTIVE PROTOCOL: MORIS 1901";
            }
            // Trigger the existing runEngine function
            if (typeof runEngine === "function") runEngine();
        };

        console.log("Vylus Comic Plugin Loaded Successfully.");
    })();
</script>
